version: '3.3'
services:
    mongodb:
        ports:
            - '27017:27017'
        container_name: p-frog_mongo
        restart: always
        logging:
            options:
                max-size: 1g
        environment:
            - MONGO_INITDB_ROOT_USERNAME=admin
            - MONGO_INITDB_ROOT_PASSWORD=pfrogpswrd
        image: mongo:7.0
        volumes:
            - ./db:/data/db

    opensearch:
        image: opensearchproject/opensearch:2.18.0
        container_name: p-frog_opensearch
        restart: always
        environment:
            - discovery.type=single-node
            - DISABLE_SECURITY_PLUGIN=true
            - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
        ports:
            - '9200:9200'
        volumes:
            - ./opensearch-data:/usr/share/opensearch/data
        ulimits:
            memlock:
                soft: -1
                hard: -1
            nofile:
                soft: 65536
                hard: 65536

    opensearch-dashboards:
        image: opensearchproject/opensearch-dashboards:2.18.0
        container_name: p-frog_opensearch_dashboards
        restart: always
        environment:
            - OPENSEARCH_HOSTS=http://opensearch:9200
            - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
        ports:
            - '5601:5601'
        depends_on:
            - opensearch
