<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 60" width="210" height="60" role="img" aria-label="P-Frog">
  <!-- Icon: indigo circle -->
  <circle cx="30" cy="30" r="28" fill="#4F46E5"/>
  <!-- Frog body -->
  <ellipse cx="30" cy="37" rx="16" ry="13" fill="white"/>
  <!-- Eyes -->
  <circle cx="20" cy="21" r="9.5" fill="white"/>
  <circle cx="40" cy="21" r="9.5" fill="white"/>
  <!-- Pupils -->
  <circle cx="20" cy="21" r="5.5" fill="#4F46E5"/>
  <circle cx="40" cy="21" r="5.5" fill="#4F46E5"/>
  <!-- Eye shine -->
  <circle cx="22.5" cy="19" r="1.8" fill="white"/>
  <circle cx="42.5" cy="19" r="1.8" fill="white"/>
  <!-- Smile -->
  <path d="M 21 41 Q 30 49 39 41" stroke="#4F46E5" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Wordmark -->
  <text x="70" y="40" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif" font-weight="800" font-size="28" fill="#3730A3" letter-spacing="-1">P-Frog</text>
</svg>
