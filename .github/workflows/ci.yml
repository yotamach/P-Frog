# Continuous Integration workflow: Build -> Test -> Lint

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # BRANCH NAME VALIDATION (safety net for local hook)
  validate-branch-name:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Check branch name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "Validating branch name: $BRANCH_NAME"
          
          if [[ ! "$BRANCH_NAME" =~ ^PF-[0-9]+_[A-Za-z]+$ ]]; then
            echo "❌ Branch name does not match required pattern: ^PF-\\d+_[A-Za-z]+$"
            echo "Example valid branch names:"
            echo "  - PF-123_FeatureName"
            echo "  - PF-456_BugFix"
            echo "  - PF-789_Update"
            exit 1
          fi
          
          echo "✅ Branch name is valid"

  # BUILD JOBS
  build-client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Build client
        run: yarn build

  build-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Check for backend changes
        id: check-backend
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED_FILES" | grep -qE '^apps/api/|^libs/data/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build server
        if: steps.check-backend.outputs.changed == 'true'
        run: yarn tsc --project apps/api/tsconfig.app.json --noEmit

      - name: Skip server build
        if: steps.check-backend.outputs.changed == 'false'
        run: echo "No backend changes detected, skipping build"

  # TEST JOBS (depend on builds)
  server-unittests:
    needs: [build-server]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Check for server changes
        id: check-server
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED_FILES" | grep -qE '^apps/api/|^libs/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run server tests
        if: steps.check-server.outputs.changed == 'true'
        run: yarn test:server

      - name: Skip server tests
        if: steps.check-server.outputs.changed == 'false'
        run: echo "No server changes detected, skipping tests"

  e2e-tests:
    needs: [build-client]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Check for client changes
        id: check-client
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED_FILES" | grep -qE '^apps/p-frog/|^libs/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Start client in background
        if: steps.check-client.outputs.changed == 'true'
        run: yarn start &

      - name: Wait for client to be ready
        if: steps.check-client.outputs.changed == 'true'
        run: |
          echo "Waiting for client to start on http://localhost:4200..."
          timeout 120 bash -c 'until curl -s http://localhost:4200 > /dev/null; do sleep 2; done'
          echo "Client is ready!"

      - name: Run e2e tests
        if: steps.check-client.outputs.changed == 'true'
        run: yarn nx run p-frog-e2e:e2e

      - name: Skip e2e tests
        if: steps.check-client.outputs.changed == 'false'
        run: echo "No client changes detected, skipping e2e tests"

  # LINT JOBS (depend on builds)
  lint-client:
    needs: [build-client]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Check for client changes
        id: check-client
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED_FILES" | grep -qE '^apps/p-frog/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Lint client
        if: steps.check-client.outputs.changed == 'true'
        run: yarn nx lint p-frog

      - name: Skip client lint
        if: steps.check-client.outputs.changed == 'false'
        run: echo "No client changes detected, skipping lint"

  lint-server:
    needs: [build-server]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Check for server changes
        id: check-server
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED_FILES" | grep -qE '^apps/api/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Lint server
        if: steps.check-server.outputs.changed == 'true'
        run: yarn nx lint api

      - name: Skip server lint
        if: steps.check-server.outputs.changed == 'false'
        run: echo "No server changes detected, skipping lint"

  lint-libs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Check for libs changes
        id: check-libs
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED_FILES" | grep -qE '^libs/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Lint libs
        if: steps.check-libs.outputs.changed == 'true'
        run: yarn nx lint data

      - name: Skip libs lint
        if: steps.check-libs.outputs.changed == 'false'
        run: echo "No libs changes detected, skipping lint"
