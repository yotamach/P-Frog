# Continuous Integration workflow: Build -> Test -> Lint

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # BRANCH NAME VALIDATION (safety net for local hook)
  validate-branch-name:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Check branch name
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "Validating branch name: $BRANCH_NAME"
          
          if [[ ! "$BRANCH_NAME" =~ ^PF-[0-9]+_[A-Za-z0-9_]+$ ]]; then
            echo "❌ Branch name does not match required pattern: ^PF-\\d+_[A-Za-z0-9_]+$"
            echo "Example valid branch names:"
            echo "  - PF-123_FeatureName"
            echo "  - PF-456_BugFix"
            echo "  - PF-4_Create_Home_Page"
            echo "  - PF-10_Update_API_v2"
            exit 1
          fi
          
          echo "✅ Branch name is valid"

  # BUILD JOBS
  build-client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Check for frontend changes
        id: check-frontend
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED_FILES" | grep -qE '^apps/p-frog/|^libs/data/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build client
        if: steps.check-frontend.outputs.changed == 'true'
        run: yarn build

      - name: Skip client build
        if: steps.check-frontend.outputs.changed == 'false'
        run: echo "No frontend changes detected, skipping build"

  build-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Check for backend changes
        id: check-backend
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED_FILES" | grep -qE '^apps/api/|^libs/data/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Build server
        if: steps.check-backend.outputs.changed == 'true'
        run: yarn build:server-dev

      - name: Skip server build
        if: steps.check-backend.outputs.changed == 'false'
        run: echo "No backend changes detected, skipping build"

  # TEST JOBS
  server-unittests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Check for server changes
        id: check-server
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED_FILES" | grep -qE '^apps/api/|^libs/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Run server tests
        if: steps.check-server.outputs.changed == 'true'
        run: yarn test:server

      - name: Skip server tests
        if: steps.check-server.outputs.changed == 'false'
        run: echo "No server changes detected, skipping tests"

  e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Check for app changes
        id: check-apps
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED_FILES" | grep -qE '^apps/p-frog/|^apps/api/|^libs/data/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create backend environment file
        if: steps.check-apps.outputs.changed == 'true'
        run: |
          cat > apps/api/.env.development << EOF
          SERVER_HOST=localhost
          SERVER_PORT=3333
          DB_HOST=localhost
          DB_PORT=27017
          DB_SCHEMA=p-frog
          DB_USERNAME=admin
          DB_PASSWORD=pfrogpswrd
          JWT_SECRET=test-jwt-secret-for-ci-cd
          EOF

      - name: Create frontend environment file
        if: steps.check-apps.outputs.changed == 'true'
        run: |
          cat > apps/p-frog/.env.development << EOF
          VITE_SERVER_HOST=localhost
          VITE_SERVER_PORT=3333
          EOF

      - name: Start MongoDB in Docker
        if: steps.check-apps.outputs.changed == 'true'
        run: docker compose up -d

      - name: Wait for MongoDB to be ready
        if: steps.check-apps.outputs.changed == 'true'
        run: |
          echo "Waiting for MongoDB to start..."
          timeout 60 bash -c 'until docker exec p-frog_mongo mongosh -u admin -p pfrogpswrd --authenticationDatabase admin --eval "db.runCommand({ ping: 1 })" > /dev/null 2>&1; do sleep 2; done'
          echo "MongoDB is ready!"

      - name: Start backend server in background
        if: steps.check-apps.outputs.changed == 'true'
        run: yarn start:server-dev &

      - name: Wait for backend to be ready
        if: steps.check-apps.outputs.changed == 'true'
        run: |
          echo "Waiting for backend to start on http://localhost:3333..."
          timeout 120 bash -c 'until curl -s http://localhost:3333/api > /dev/null; do sleep 2; done'
          echo "Backend is ready!"

      - name: Start client in background
        if: steps.check-apps.outputs.changed == 'true'
        run: yarn start &

      - name: Wait for client to be ready
        if: steps.check-apps.outputs.changed == 'true'
        run: |
          echo "Waiting for client to start on http://localhost:4200..."
          timeout 120 bash -c 'until curl -s http://localhost:4200 > /dev/null; do sleep 2; done'
          echo "Client is ready!"

      - name: Run e2e tests
        if: steps.check-apps.outputs.changed == 'true'
        run: yarn nx run p-frog-e2e:e2e

      - name: Cleanup
        if: always() && steps.check-apps.outputs.changed == 'true'
        run: docker compose down

      - name: Skip e2e tests
        if: steps.check-apps.outputs.changed == 'false'
        run: echo "No app changes detected, skipping e2e tests"

  # LINT JOBS
  lint-client:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Check for client changes
        id: check-client
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED_FILES" | grep -qE '^apps/p-frog/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Lint client
        if: steps.check-client.outputs.changed == 'true'
        run: yarn nx run p-frog:lint

      - name: Skip client lint
        if: steps.check-client.outputs.changed == 'false'
        run: echo "No client changes detected, skipping lint"

  lint-server:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile || yarn install

      - name: Check for server changes
        id: check-server
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/master" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            if echo "$CHANGED_FILES" | grep -qE '^apps/api/'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Lint server
        if: steps.check-server.outputs.changed == 'true'
        run: yarn nx run api:lint

      - name: Skip server lint
        if: steps.check-server.outputs.changed == 'false'
        run: echo "No server changes detected, skipping lint"
